<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Identity Verification</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="verification-page">
  <div class="verification-container">
    <div class="title">Verify Your Identity</div>
    <div class="description">
      Please provide a photo of your national ID card in order to fulfill the identity verification requirements.
    </div>

    <label for="dni-upload" class="dni-box" title="Click to upload your ID image">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4
                 c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm0 2v12h16V6H4zm2 2h5v1H6V8zm0 2h5v1H6v-1zm0 2h3v1H6v-1zm10-4c1.1 0 2 .9 2 2
                 s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm-2 6h4v1h-4v-1z"/>
      </svg>
      <img id="preview" alt="Image preview" style="display:none;" />
    </label>
    <input type="file" id="dni-upload" accept="image/*" />

    <button id="saveregister" disabled>Submit</button>
    <div id="statusMessage"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="app-script.js"></script>
</body>
</html>
